name: Gerar manifest de fotos

# Roda automaticamente sempre que alguém subir ou apagar arquivos dentro de /fotos/.
# Regenera fotos/manifest.json com a lista atual de imagens e faz commit direto no
# repositorio. Ninguem precisa editar o manifest na mao — so soltar/apagar fotos.
on:
  push:
    branches: [main]
    paths:
      - 'fotos/**'
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions, se precisar

permissions:
  contents: write

# Duas renomeações/uploads em sequência rápida (poucos segundos de diferença)
# disparam duas execuções desta Action quase juntas. Sem isso, ambas fazem
# checkout do mesmo commit e a que tenta empurrar por último recebe um
# "non-fast-forward" (rejeitada) — foi o que aconteceu em 2026-07-09 ao
# renomear "1.jpg" pra "10.jpg" logo antes de renomear outra foto. Com
# concurrency, a segunda execução espera a primeira terminar (e faz
# checkout já com o commit dela aplicado), então nunca competem pelo push.
concurrency:
  group: gerar-manifest
  cancel-in-progress: false

jobs:
  gerar-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Gerar fotos/manifest.json
        run: |
          cd fotos
          # Lista jpg/jpeg/png/webp (case-insensitive), ignora o proprio manifest,
          # ordena por nome e monta um array JSON simples de nomes de arquivo.
          find . -maxdepth 1 -type f \
            \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
            -printf '%f\n' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))' \
            > manifest.json
          echo "Conteudo gerado:"
          cat manifest.json

      - name: Commitar manifest atualizado (se mudou)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fotos/manifest.json
          if git diff --cached --quiet; then
            echo "Nada mudou no manifest — nao ha o que commitar."
          else
            git commit -m "chore: atualizar fotos/manifest.json automaticamente"
            # Rede de seguranca extra alem do concurrency acima: se mesmo assim
            # o push for rejeitado (ex.: alguem commitou outra coisa na main
            # nesse meio-tempo), tenta de novo com rebase antes de desistir.
            for i in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "Push rejeitado (provavel commit concorrente na main) — tentativa $i, rebaseando e tentando de novo..."
              git fetch origin main
              git rebase origin/main
              sleep 3
            done
          fi
