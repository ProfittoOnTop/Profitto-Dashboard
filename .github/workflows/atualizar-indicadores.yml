name: Atualizar indicadores
on:
  push:
    branches: [main]
    paths:
      - 'dados/indicadores.csv'
  workflow_dispatch: {}
permissions:
  contents: write

# Esta Action também comita sozinha na main (dados/indicadores-valores.json).
# Se rodar ao mesmo tempo que outra que empurra pra main (ex.: a "Gerar manifest
# de fotos", caso um mesmo push mexa em dados/ e fotos/), a que empurrar por
# último leva "non-fast-forward" e falha. Como esta roda só ~1x por mês, uma
# falha silenciosa deixaria os dados desatualizados até o próximo upload — então
# vale a mesma proteção do gerar-manifest.yml: serializar execuções e, se ainda
# assim o push for rejeitado, tentar de novo com rebase.
concurrency:
  group: commit-main
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4
      - name: Rodar o casamento e gerar dados/indicadores-valores.json
        run: node .github/scripts/atualizar-indicadores.js
      - name: Commitar (se algo mudou)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/indicadores-valores.json dados/ultima-atualizacao.md
          if git diff --cached --quiet; then
            echo "Nada novo pra aplicar."
          else
            git commit -m "chore: atualizar indicadores-valores.json automaticamente"
            # Rede de seguranca alem do concurrency: se o push for rejeitado
            # (algum commit concorrente na main nesse meio-tempo), tenta de novo
            # com rebase antes de desistir.
            for i in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "Push rejeitado (provavel commit concorrente na main) — tentativa $i, rebaseando e tentando de novo..."
              git fetch origin main
              git rebase origin/main
              sleep 3
            done
          fi
